      :root {

      }
      body {

      .hover-lift:hover {

        right: 1rem;
        z-index: 50;
        animation: slide-up 0.3s ease, fade-out 0.3s ease 3.7s forwards;
      }
      @keyframes slide-up {
        from {
          transform: translateY(100%);

        to {
          transform: translateY(0);

      }
      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
